name: SSL Certificate Check

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6:00 UTC
  workflow_dispatch:

jobs:
  ssl-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check SSL expiration
        run: |
          DOMAIN=https://backend.i-guide.io
          
          # Get expiration date
          EXPIRY_DATE=$(echo | openssl s_client -servername backend.i-guide.io -connect backend.i-guide.io:443 2>/dev/null \
                        | openssl x509 -noout -enddate | cut -d= -f2)

          EXPIRY_SECONDS=$(date -d "$EXPIRY_DATE" +%s)
          NOW_SECONDS=$(date +%s)

          DAYS_LEFT=$(( ($EXPIRY_SECONDS - $NOW_SECONDS) / 86400 ))

          echo "SSL certificate for $DOMAIN expires in $DAYS_LEFT days"

          if [ $DAYS_LEFT -lt 30 ]; then
            echo "⚠️ Certificate expires in less than 30 days!"
            exit 1
          fissl-check.yml
